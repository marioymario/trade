services:
  trade:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: trade
    container_name: trade
    ports:
      - "${JUPYTER_BIND_ADDR:-127.0.0.1}:8888:8888"
    env_file:
      - .env
    environment:
      SYMBOL: ${SYMBOL:-BTC/USD}
      TIMEFRAME: ${TIMEFRAME:-5m}
      CCXT_EXCHANGE: ${CCXT_EXCHANGE:-coinbase}
      DATA_TAG: ${DATA_TAG:-coinbase_live}
      DRY_RUN: ${DRY_RUN:-1}
      LOOP_SLEEP_SECONDS: ${LOOP_SLEEP_SECONDS:-60}
      MIN_BARS: ${MIN_BARS:-200}
      MAX_ORDER_SIZE: ${MAX_ORDER_SIZE:-0.01}
      FEE_BPS: ${FEE_BPS:-8}
      SLIPPAGE_BPS: ${SLIPPAGE_BPS:-5}
      COOLDOWN_BARS: ${COOLDOWN_BARS:-1}

      # TEST HOOKS (default OFF)
      TEST_HOOKS_ENABLED: ${TEST_HOOKS_ENABLED:-0}
      FORCE_ENTRY_SIGNAL_ONCE: ${FORCE_ENTRY_SIGNAL_ONCE:-0}
      FORCE_COOLDOWN_BLOCK_ONCE: ${FORCE_COOLDOWN_BLOCK_ONCE:-0}
      FORCE_COOLDOWN_BARS: ${FORCE_COOLDOWN_BARS:-0}
      FORCE_FEATURES_INVALID_N: ${FORCE_FEATURES_INVALID_N:-0}
      FORCE_CADENCE_FAIL_N: ${FORCE_CADENCE_FAIL_N:-0}
      BYPASS_FEATURE_VALIDATION: ${BYPASS_FEATURE_VALIDATION:-0}

      TF_ENABLE_ONEDNN_OPTS: 0
      TF_CPP_MIN_LOG_LEVEL: 2
      TZ: America/Los_Angeles
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./notebooks:/work/notebooks
      - ./files:/work/files
      - ./data:/work/data
      - /home/kk7wus/trade_flags:/home/kk7wus/trade_flags
    working_dir: /work
    command: >
      jupyter lab --ip=0.0.0.0 --no-browser
      --NotebookApp.token=''
      --NotebookApp.password=''

  paper:
    image: trade
    depends_on:
      - trade
    container_name: paper
    env_file:
      - .env
    environment:
      SYMBOL: ${SYMBOL:-BTC/USD}
      TIMEFRAME: ${TIMEFRAME:-5m}
      CCXT_EXCHANGE: ${CCXT_EXCHANGE:-coinbase}
      DATA_TAG: ${DATA_TAG:-coinbase_live}
      DRY_RUN: ${DRY_RUN:-1}
      LOOP_SLEEP_SECONDS: ${LOOP_SLEEP_SECONDS:-60}
      MIN_BARS: ${MIN_BARS:-200}
      MAX_ORDER_SIZE: ${MAX_ORDER_SIZE:-0.01}
      FEE_BPS: ${FEE_BPS:-8}
      SLIPPAGE_BPS: ${SLIPPAGE_BPS:-5}
      COOLDOWN_BARS: ${COOLDOWN_BARS:-1}

      # TEST HOOKS (default OFF)
      TEST_HOOKS_ENABLED: ${TEST_HOOKS_ENABLED:-0}
      FORCE_ENTRY_SIGNAL_ONCE: ${FORCE_ENTRY_SIGNAL_ONCE:-0}
      FORCE_COOLDOWN_BLOCK_ONCE: ${FORCE_COOLDOWN_BLOCK_ONCE:-0}
      FORCE_COOLDOWN_BARS: ${FORCE_COOLDOWN_BARS:-0}
      FORCE_FEATURES_INVALID_N: ${FORCE_FEATURES_INVALID_N:-0}
      FORCE_CADENCE_FAIL_N: ${FORCE_CADENCE_FAIL_N:-0}
      BYPASS_FEATURE_VALIDATION: ${BYPASS_FEATURE_VALIDATION:-0}

      TF_ENABLE_ONEDNN_OPTS: 0
      TF_CPP_MIN_LOG_LEVEL: 2
      TZ: America/Los_Angeles
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./files:/work/files
      - ./data:/work/data
      - /home/kk7wus/trade_flags:/home/kk7wus/trade_flags
    working_dir: /work
    command: python -m files.main

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: trade-dashboard
    container_name: dashboard
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "127.0.0.1:8501:8501"
    env_file:
      - .env
    environment:
      PYTHONPATH: /work
      TZ: America/Los_Angeles
      FLAGS_DIR: "/home/kk7wus/trade_flags"
      STREAMLIT_SERVER_RUN_ON_SAVE: "true"
      STREAMLIT_SERVER_FILE_WATCHER_TYPE: "poll"
    working_dir: /work
    volumes:
      - /home/kk7wus/trade_flags:/home/kk7wus/trade_flags:rw
      - ./files:/work/files:ro
      - ./data:/work/data:ro
      - ./dashboard:/app:rw
